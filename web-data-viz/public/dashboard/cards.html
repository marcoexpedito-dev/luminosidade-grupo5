<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightness Photo</title>

    <link rel="stylesheet" href="../css/dashboards.css" />
    <!-- <link rel="stylesheet" href="../css/estilo.css" /> -->
    <link rel="stylesheet" href="../css/foto.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body onload="validarSessao(), exibirAquarios(),  atualizacaoPeriodica()">

    <div class="janela">

        <div class="header-left dash-header">

            <h1>Lightness Photo</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="container">

            <h1>Capture sua Foto</h1>

            <video id="video" autoplay></video>

            <button onclick="tirarFoto()">Capturar foto</button>

            <canvas id="canvas"></canvas>

            <div id="polaroid" class="polaroid">
                <img id="fotoFinal">
                <p></p>
            </div>

            <button onclick="baixarPolaroid()">
                Baixar Polaroid
            </button>
        </div>
        <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    </div>

    </div>

    </div>

</body>

<script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const fotoFinal = document.getElementById("fotoFinal");
    const polaroid = document.getElementById("polaroid");
    let imagemCapturada = "";

    // Liga webcam
    navigator.mediaDevices.getUserMedia({
        video: true
    })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(erro => {
            alert("Erro ao acessar câmera");
            console.log(erro);
        });

    function tirarFoto() {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");

        ctx.drawImage(
            video,
            0,
            0,
            canvas.width,
            canvas.height
        );

        imagemCapturada = canvas.toDataURL("image/png");

        fotoFinal.src = imagemCapturada;

        polaroid.style.display = "block";

        fotoFinal.classList.remove("revelando");

        void fotoFinal.offsetWidth;

        fotoFinal.classList.add("revelando");
    }

    async function baixarPolaroid() {

        const polaroid = document.getElementById("polaroid");

        const rotacaoOriginal = polaroid.style.transform;

        polaroid.style.transform = "none";

        const canvas = await html2canvas(polaroid);

        polaroid.style.transform = rotacaoOriginal;

        const link = document.createElement("a");

        link.download = "polaroid.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }




</script>

</html>
